specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: ACRCloud
providerId: acrcloud
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Audio
- Music Recognition
- Audio Fingerprinting
- Broadcast Monitoring
- Metadata
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of ACRCloud spend. ACRCloud bills usage-based per-recognition rates
  for music and custom audio identification, per-scanned-hour or per-recognition
  rates for file scanning, per-channel/stream monthly subscription rates for
  broadcast monitoring, and per-lookup rates for external metadata enrichment.
notes: >-
  ACRCloud does not publish a complete standardized public price table; per-product
  rates are quoted per use case. Verify against the pricing page and account
  agreement during reconciliation.
sources:
- https://www.acrcloud.com/pricing/
- https://docs.acrcloud.com
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: ACRCloud
serviceCategory: AI and Machine Learning
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: ACRCloud
  ServiceCategory: AI and Machine Learning
  ProviderName: ACRCloud
  PublisherName: ACRCloud
  InvoiceIssuerName: ACRCloud
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: Usage-Based
meters:
- name: recognition_requests
  description: Music and custom audio recognition requests against the Identification API, billed per recognition.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - project
  - product
- name: file_scanning_hours
  description: Audio hours processed by file-scanning containers.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - container
- name: monitored_channels
  description: Broadcast or custom-stream channels monitored, billed per channel per month.
  unit: channels
  aggregation: sum
  dimensions:
  - account
  - project
- name: metadata_lookups
  description: External Metadata API lookups for enriched track metadata.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - platform
principles:
- name: Visibility
  description: Pull ACRCloud console usage per project and access key; inspect recognition counts and monitored channels.
- name: Allocation
  description: Map access keys and projects to workloads/teams and internal cost centers.
- name: Optimization
  description: Use fingerprints instead of raw audio to cut bandwidth; right-size monitored channels; reserve broadcast monitoring for streams that need continuous coverage.
- name: Accountability
  description: Assign owners per project; review recognition burn and monitoring subscriptions monthly against budget.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
